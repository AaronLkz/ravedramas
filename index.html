<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. Queen - Catálogo</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      color: #e50914;
      margin-top: 20px;
    }
    .video-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
    }
    .video-item {
      background-color: #333;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
      width: 280px;
      margin-bottom: 20px;
      text-align: center;
    }
    .video-item iframe {
      width: 100%;
      height: 160px;
      border: none;
    }
    .video-item span {
      display: block;
      background-color: #e50914;
      color: white;
      font-size: 18px;
      padding: 10px 0;
      font-weight: bold;
    }
    .video-item button {
      margin: 10px 0;
      background-color: #e50914;
      color: white;
      padding: 10px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      width: 100%;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    .video-item button:hover {
      background-color: #b50d11;
    }
    .video-item button:focus {
      outline: none;
    }
    .video-item img {
      width: 100%;
      height: auto;
      border-bottom: 3px solid #e50914;
    }
  </style>
</head>
<body>

  <h1>Mr. Queen - Temporada 1</h1>

  <div class="video-gallery">
    <!-- Capítulo 1 -->
    <div class="video-item">
