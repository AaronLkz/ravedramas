<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr. Queen - Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #faf3e0; /* Fondo en color pastel cálido */
      color: #333;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    h1 {
      color: #ff6f61; /* Título en color coral */
      font-weight: bold;
      margin-top: 40px;
      font-size: 3em;
      letter-spacing: 2px;
    }
    .video-gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 30px;
      padding: 20px;
      margin-top: 30px;
    }
    .video-item {
      background-color: #fdf1e7; /* Color de fondo suave para los items */
      border-radius: 10px;
      overflow: hidden;
      width: 280px;
      margin-bottom: 20px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
    }
    .video-item:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 105, 97, 0.5);
    }
    .video-item iframe {
      width: 100%;
      height: 160px;
      border: none;
    }
    .video-item span {
      display: block;
      background: linear-gradient(to right, #ffb6b9, #ff6f61); /* Degradado cálido para el texto */
      color: white;
      font-size: 18px;
      padding: 10px 0;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 1px 1px 5px rgba(255, 255, 255, 0.7);
    }
    .video-item button {
      margin: 10px 0;
      background: linear-gradient(to right, #ff6f61, #ffb6b9); /* Degradado para el botón */
      color: white;
      padding: 10px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      width: 100%;
      border-radius: 5px;
      transition: background-color 0.3s, transform 0.2s ease, box-shadow 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 105, 97, 0.7);
    }
    .video-item button:hover {
      background: linear-gradient(to right, #ffb6b9, #ff6f61);
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
    }
    .video-item button:focus {
      outline: none;
    }
    .video-item img {
      width: 100%;
      height: auto;
      border-bottom: 3px solid #ff6f61;
    }
    .video-item h3 {
      color: #333;
      font-size: 20px;
      margin-top: 10px;
    }
    .video-item .episode-number {
      font-size: 16px;
      font-weight: 500;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Mr. Queen - Temporada 1</h1>

  <div class="video-gallery">
    <!-- Capítulo 1 -->

      <iframe src="https://rumble.com/embed/v6qef0l/?pub=4lcv1n" allowfullscreen></iframe>
