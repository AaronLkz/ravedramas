<!DOCTYPE html>
<html>
<head>
    <title>Generador de Capítulos</title>
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 20px; 
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #5A4A42;
            text-align: center;
            margin-bottom: 30px;
        }
        textarea { 
            width: 100%; 
            height: 300px; 
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #D4A59A;
            font-family: monospace;
            background-color: white;
        }
        button { 
            padding: 12px 25px; 
            background: #D4A59A; 
            color: white; 
            border: none; 
            cursor: pointer;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 500;
            display: block;
            margin: 0 auto;
            transition: all 0.3s ease;
        }
        button:hover { 
            background: #C88EA7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(200, 142, 167, 0.3);
        }
        .copy-btn {
            background: #5A4A42;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #3a2e28;
        }
        .instructions {
            background-color: #F3E9DC;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #5A4A42;
        }
    </style>
</head>
<body>
    <h1>Generador de Capítulos RaveDramas</h1>
    
    <div class="instructions">
        <p><strong>Instrucciones:</strong> Haz clic en "Comenzar a Generar" e introduce los datos de cada capítulo. El generador creará el código HTML con la nueva estructura optimizada.</p>
    </div>
    
    <button id="iniciar">Comenzar a Generar</button>
    <textarea id="resultado" placeholder="Aquí aparecerá el código generado..." readonly></textarea>
    <button id="copiar" class="copy-btn">Copiar al Portapapeles</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const iniciarBtn = document.getElementById('iniciar');
            const copiarBtn = document.getElementById('copiar');
            const resultadoTextarea = document.getElementById('resultado');
            
            iniciarBtn.addEventListener('click', function() {
                let codigoFinal = '';
                let continuar = true;
                
                while(continuar) {
                    const numero = prompt("Introduce el número del episodio (ej: 1):");
                    if (numero === null) break;
                    
                    const badge = prompt("Introduce el texto para el badge (ej: 'Episodio 1' o 'Película'):", `Episodio ${numero}`);
                    if (badge === null) break;
                    
                    const titulo = prompt("Introduce el título del episodio:");
                    if (titulo === null) break;
                    
                    const sipnosis = prompt("Introduce la sipnosis:");
                    if (sipnosis === null) break;
                    
                    const enlaceEmbed = prompt("Introduce el enlace embed (iframe) de Rumble:");
                    if (enlaceEmbed === null) break;
                    
                    const enlaceNormal = enlaceEmbed; // Usamos el mismo enlace para iframe y botón
                    
                    // Generar el código HTML con la nueva estructura
                    const codigo = `<!-- ${badge} -->
<article class="video-item">
    <span class="episode-badge">${badge}</span>
    <iframe src="${enlaceEmbed}" allowfullscreen sandbox="allow-same-origin allow-scripts allow-popups" loading="lazy" title="${titulo}"></iframe>
    <div class="video-info">
        <h3>${titulo}</h3>
        <p>${sipnosis}</p>
        <button class="watch-btn" onclick="window.open('${enlaceNormal}', '_blank', 'noopener')">Ver ahora</button>
    </div>
</article>\n\n`;
                    
                    codigoFinal += codigo;
                    
                    continuar = confirm("¿Deseas añadir otro capítulo?");
                    if (!continuar) {
                        resultadoTextarea.value = codigoFinal;
                        resultadoTextarea.focus();
                        resultadoTextarea.select();
                    }
                }
            });
            
            copiarBtn.addEventListener('click', function() {
                resultadoTextarea.select();
                document.execCommand('copy');
                alert("¡Código copiado al portapapeles!");
            });
        });
    </script>
</body>
</html>
